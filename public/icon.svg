<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4BC"/>
      <stop offset="100%" style="stop-color:#DCC78F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#B8956A"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#5D4037" stroke-width="3"/>
  
  <!-- 装饰环 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#C4A77D" stroke-width="1"/>
  
  <!-- 积分符号 -->
  <text x="50" y="62" 
        font-family="Times New Roman, serif" 
        font-size="36" 
        font-weight="bold"
        fill="#5D4037" 
        text-anchor="middle">∫</text>
  
  <!-- 装饰元素 -->
  <circle cx="25" cy="25" r="3" fill="url(#accent)"/>
  <circle cx="75" cy="25" r="3" fill="url(#accent)"/>
  <circle cx="25" cy="75" r="3" fill="url(#accent)"/>
  <circle cx="75" cy="75" r="3" fill="url(#accent)"/>
</svg>
